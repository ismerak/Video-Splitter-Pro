services:
  - type: web
    name: video-splitter-pro
    runtime: python
    plan: free
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    nativePackages:
      - ffmpeg
