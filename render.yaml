services:
  - type: web
    name: video-splitter-pro
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: vsp-storage
      mountPath: /tmp
      sizeGB: 10
